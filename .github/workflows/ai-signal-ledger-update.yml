name: Update AI Brief

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-signal-ledger
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build data
        run: npm run build:data

      - name: Commit refreshed dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh AI brief data'
          file_pattern: ai-signal-ledger/data/brief.json
          repository: .
