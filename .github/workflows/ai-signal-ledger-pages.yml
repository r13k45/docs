name: Deploy AI Signal Ledger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ai-signal-ledger/**'
      - '.github/workflows/ai-signal-ledger-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-signal-ledger

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
